        :root {

            background-color: var(--primary-color);

        .config-panel {

        }

            display: flex; align-items: center; background: rgba(255, 255, 255, 0.1);

            gap: 10px; font-size: 0.9rem;

        .currency-controller input, .currency-controller select {
            padding: 4px 6px; border-radius: 4px; border: none;
            font-weight: bold; text-align: center; color: var(--primary-color); font-size: 0.95rem;
            outline: none;
        }

        .main-layout { display: flex; flex: 1; max-width: 1440px; width: 100%; margin: 0 auto; }

        @media (max-width: 900px) { .main-layout { flex-direction: column; } }

        .sidebar {

        .category-menu-item .qty-badge { background-color: #f1f5f9; color: #64748b; font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .category-menu-item.active .qty-badge { background-color: #bae6fd; color: #0369a1; }

        .showcase-header { margin-bottom: 25px; }
        .showcase-header h2 { margin: 0 0 8px 0; color: var(--primary-color); font-size: 1.7rem; }
        .showcase-header p { margin: 0; color: #64748b; font-size: 0.95rem; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(430px, 1fr)); gap: 25px; }
        @media (max-width: 500px) { .products-grid { grid-template-columns: 1fr; } }

            background-color: var(--white); border: 1px solid var(--border-color); border-radius: 8px;

        .btn-prepare {

</head>

        function updateAllPrices() {
            const rateInput = document.getElementById('exchangeRate');
            const discountSelect = document.getElementById('discountSelect');
            
            if (rateInput) currentRate = parseFloat(rateInput.value) || 17.23;
            if (discountSelect) currentDiscount = parseFloat(discountSelect.value) || 0;

            const activeMenuItem = document.querySelector('.category-menu-item.active');
            if (activeMenuItem) {
                const categoryId = activeMenuItem.id.replace('menu-', '');
                renderCategory(categoryId);
            }
        }

        function renderCategory(categoryId) {
            document.querySelectorAll('.category-menu-item').forEach(li => li.classList.remove('active'));
            const activeLi = document.getElementById(`menu-${categoryId}`);
            if (activeLi) activeLi.classList.add('active');

            const container = document.getElementById('productsContainer');
            const titleElem = document.getElementById('categoryTitle');
            const descElem = document.getElementById('categoryDesc');

            if (!container || !titleElem || !descElem) return;

            container.innerHTML = '';

            if (catalogData[categoryId] && catalogData[categoryId].products.length > 0) {
                titleElem.innerText = catalogData[categoryId].title;
                descElem.innerText = catalogData[categoryId].desc;

                catalogData[categoryId].products.forEach((prod) => {
                    const costoMXNSinIva = prod.costUSD * currentRate;
                    const costoMXNConIva = costoMXNSinIva * 1.16;

                    const basePublico = costoMXNConIva * 1.55; 
                    const precioFinalPublico = basePublico * (1 - currentDiscount);
                    const margenAsegurado = precioFinalPublico - costoMXNConIva;

                    // SOLUCIÓN PARA LINUX: Reemplaza dinámicamente la diagonal por un guión bajo para la ruta de la imagen
                    const sanitizedFilename = prod.model.replace('/', '_');
                    const computedImgUrl = `${GITHUB_IMG_BASE}${sanitizedFilename}.jpg`;

                    const card = document.createElement('div');
                    card.className = 'product-card';
                    
                    let featuresHTML = '';
                    if (prod.features && prod.features.length > 0) {
                        featuresHTML = `<ul class="product-features-list">`;
                        prod.features.slice(0, 3).forEach(f => {
                            featuresHTML += `<li>${f}</li>`;
                        });
                        featuresHTML += `</ul>`;
                    }

                    card.innerHTML = `
                        <div class="product-body">
                            <div class="product-main-info">
                                <div class="product-img-box" onclick="triggerFlyerGeneration('${prod.model}')">
                                    <img src="${computedImgUrl}" alt="${prod.model}" onerror="this.src='byte.png'">
                                </div>
                                <div class="product-details">
                                    <div class="product-model">${prod.model}</div>
                                    <h3 class="product-title-specs">${prod.titleSpecs}</h3>
                                    <div class="product-price-list">
                                        ${currentDiscount > 0 ? `<span class="original-price">$${basePublico.toFixed(2)}</span>` : ''}
                                        <span class="final-price">$${precioFinalPublico.toFixed(2)} MXN</span>
                                        <span class="usd-reference">Ref. Distribuidor: $${prod.costUSD.toFixed(2)} USD (c/IVA: $${costoMXNConIva.toFixed(2)} MXN)</span>
                                    </div>
                                    <div style="background-color: #f0fdf4; color: #166534; padding: 6px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 700; margin-top: 5px; border: 1px solid #bbf7d0;">
                                        Margen Real Asegurado: +$${margenAsegurado.toFixed(2)} MXN
                                    </div>
                                </div>
                            </div>
                            <p style="margin: 0; font-size: 0.85rem; color: #64748b; line-height: 1.4;">${prod.desc}</p>
                            ${featuresHTML}
                        </div>
                        <div class="product-footer">
                            <button class="btn-prepare" onclick="triggerFlyerGeneration('${prod.model}')">🖼️ Generar Tarjeta Comercial</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else {
                const catName = categoriesList.find(c => c.id === categoryId)?.name || categoryId;
                titleElem.innerText = `Línea: ${catName}`;
                descElem.innerText = catalogData[categoryId]?.desc || `Módulo asignado a la ingeniería de ${catName.toLowerCase()}.`;
                container.innerHTML = `<p style="grid-column: 1/-1; color: #64748b; font-style: italic; padding: 30px 0;">Las soluciones de hardware y flyers asociados a esta línea de negocio se encuentran actualmente en proceso de indexación técnica.</p>`;
            }
        }

        function initMenu() {
            const menuList = document.getElementById('menuList');
            if (!menuList) return;
            menuList.innerHTML = '';
            categoriesList.forEach((cat) => {
                const count = catalogData[cat.id] ? catalogData[cat.id].products.length : 0;
                const li = document.createElement('li');
                li.className = `category-menu-item ${cat.id === 'dvr' ? 'active' : ''}`;
                li.id = `menu-${cat.id}`;
                li.onclick = () => renderCategory(cat.id);
                li.innerHTML = `<span>${cat.name}</span> <span class="qty-badge">${count}</span>`;
                menuList.appendChild(li);
            });
            renderCategory("dvr");
        }

        function triggerFlyerGeneration(modelCode) {
            const canvas = document.getElementById('processingCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 600;
            canvas.height = 400;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 600, 400);

            ctx.fillStyle = '#003366';
            ctx.fillRect(0, 0, 600, 80);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText('SOLUCIONES DE INGENIERÍA PERIMETRAL', 30, 45);

            ctx.fillStyle = '#ff6600';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText('FICHA COMERCIAL DE HARDWARE - BYTECOMTEC', 30, 68);

            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 24px sans-serif';
            ctx.fillText(`MODELO: ${modelCode}`, 40, 140);

            ctx.fillStyle = '#64748b';
            ctx.font = '14px sans-serif';
            ctx.fillText('Equipo verificado para infraestructura escolar y comercial.', 40, 170);

            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(40, 200, 520, 90);
            ctx.strokeStyle = '#e2e8f0';
            ctx.strokeRect(40, 200, 520, 90);

            ctx.fillStyle = '#003366';
            ctx.font = 'bold 15px sans-serif';
            ctx.fillText('PRECIO UNITARIO SUGERIDO DE INSTALACIÓN (MXN):', 60, 235);

            ctx.fillStyle = '#d32f2f';
            ctx.font = 'bold 28px sans-serif';
            ctx.fillText('Cotización personalizada sujeta a diagnóstico en sitio', 60, 270);

            ctx.fillStyle = '#64748b';
            ctx.font = 'italic 12px sans-serif';
            ctx.fillText('* Vigencia ligada a fluctuaciones del tipo de cambio Syscom diario.', 40, 340);
            ctx.fillText('Bytecomtec S.A. de C.V. - Soporte Técnico Autorizado', 40, 360);

            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalTargetImg');
            
            if (modal && modalImg) {
                modalImg.src = canvas.toDataURL('image/png');
                modal.style.display = 'flex';
            }
        }

        function closeLightbox() {
            const modal = document.getElementById('imageModal');
            if (modal) modal.style.display = 'none';
        }

        window.onload = initMenu;
    </script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infraestructura de Videovigilancia</title>
    <style>
        /* ==========================================================================
           Variables de Paleta de Color Corporativa
           ========================================================================== */
        :root {
            --primary-color: #003366;       /* Azul Corporativo */
            --accent-color: #ff6600;        /* Naranja Técnico */
            --bg-light: #f1f5f9;            /* Fondo general claro de la captura */
            --text-main: #1e293b;           /* Texto principal */
            --border-color: #e2e8f0;        /* Bordes sutiles */
            --white: #ffffff;
            --badge-bg: #e2e8f0;            /* Fondo de los distintivos */
            --badge-text: #4a5568;          /* Texto de los distintivos */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Contenedor General */
        .portal-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        .portal-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .portal-header h2 {
            color: var(--primary-color);
            font-size: 2.4rem;
            margin: 0 0 16px 0;
            font-weight: 700;
        }

        .portal-header p {
            color: #4a5568;
            font-size: 1.15rem;
            max-width: 800px;
            margin: 0 auto;
        }

        /* ==========================================================================
           Grid de Categorías Principales (Estilo Botón de la captura)
           ========================================================================== */
        .main-menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            padding: 10px;
        }

        /* Enlaces transformados en botones interactivos */
        .menu-card-link {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none; /* Elimina la línea azul de enlace */
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03);
            transition: all 0.25s ease;
        }

        /* Efectos de Hover idénticos al comportamiento profesional */
        .menu-card-link:hover {
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -5px rgba(0, 51, 102, 0.15);
        }

        /* Estilo de los textos de los botones */
        .menu-card-link .category-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1.2;
        }

        /* Badges / Distintivos laterales (12 Equipos, Agotado, etc.) */
        .menu-card-link .badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.88rem;
            font-weight: 600;
            white-space: nowrap;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Cambio de color sutil del badge al pasar el mouse por la tarjeta */
        .menu-card-link:hover .badge {
            background-color: var(--primary-color);
            color: var(--white);
        }

        /* Comportamiento opcional para categorías inactivas o agotadas */
        .menu-card-link.disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .menu-card-link.disabled:hover {
            transform: none;
            border-color: var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03);
        }
        .menu-card-link.disabled:hover .badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
        }
    </style>
</head>
<body>

    <div class="portal-container">

        <header class="portal-header">
            <h2>Infraestructura de Videovigilancia</h2>
            <p>Seleccione una línea tecnológica para abrir el desglose de equipamiento técnico disponible.</p>
        </header>

        <div class="main-menu-grid">

            <a href="categoria_videovigilancia_DVRs/index.html" class="menu-card-link">
                <span class="category-title">Grabadores<br>Digitales (DVR)</span>
                <span class="badge">12 Equipos</span>
            </a>

            <a href="categoria_videovigilancia_NVRs/index.html" class="menu-card-link">
                <span class="category-title">Grabadores de<br>Red (NVR)</span>
                <span class="badge">Agotado</span>
            </a>

            <a href="categoria_discos_duros/index.html" class="menu-card-link">
                <span class="category-title">Discos<br>Duros</span>
                <span class="badge">Próximamente</span>
            </a>

        </div>

    </div>

</body>
</html>
